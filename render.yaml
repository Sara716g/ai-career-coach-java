services:
  - type: web
    name: ai-career-coach-api
    runtime: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SERVER_PORT
        value: 8080
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: AI_PROVIDER
        value: gemini
      - key: AI_API_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    healthCheckPath: /actuator/health
    autoDeploy: true
