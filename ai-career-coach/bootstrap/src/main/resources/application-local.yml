# Local development with MySQL
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_career_coach?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    com.aicareercoach: DEBUG
