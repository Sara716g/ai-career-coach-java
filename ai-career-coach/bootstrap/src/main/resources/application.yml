spring:
  application:
    name: AI Career Coach

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:ai_career_coach;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:auto}
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:ZGV2LWp3dC1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZw==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai:
    provider: ${AI_PROVIDER:gemini}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:}
  file:
    upload-dir: ${UPLOAD_DIR:./uploads}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.aicareercoach: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
